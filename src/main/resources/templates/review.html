<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Write Your Review</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
}

.review-card{
    width:700px;
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 45px rgba(0,0,0,.25);
}

.card-header{
    background:white;
    text-align:center;
    padding:30px;
}

.card-header i{
    font-size:60px;
    color:#ffc107;
}

.card-header h2{
    font-weight:bold;
    margin-top:15px;
}

.card-body{
    padding:35px;
}

.form-control,
.form-select{
    border-radius:12px;
    padding:12px;
}

.form-control:focus,
.form-select:focus{
    box-shadow:none;
    border-color:#0d6efd;
}

.btn-review{
    background:#0d6efd;
    color:white;
    border-radius:30px;
    font-size:18px;
    padding:12px;
    width:100%;
    transition:.3s;
}

.btn-review:hover{
    background:#084298;
}

.upload-box{
    border:2px dashed #ccc;
    border-radius:12px;
    padding:20px;
    text-align:center;
    cursor:pointer;
}

.upload-box:hover{
    border-color:#0d6efd;
}

.star-rating{
    display:flex;
    flex-direction:row-reverse;
    justify-content:center;
}

.star-rating input{
    display:none;
}

.star-rating label{
    font-size:35px;
    color:#ddd;
    cursor:pointer;
    transition:.2s;
}

.star-rating input:checked ~ label,
.star-rating label:hover,
.star-rating label:hover ~ label{
    color:#ffc107;
}

</style>

</head>

<body>

<div class="card review-card">

    <div class="card-header">

        <i class="fas fa-taxi"></i>

        <h2>Share Your Journey</h2>

        <p class="text-muted">
            Tell us about your experience with SwiftRide
        </p>

    </div>

    <div class="card-body">

        <form th:action="@{/saveReview}"
              th:object="${review}"
              method="post"
              enctype="multipart/form-data">

            <!-- Name -->

            <div class="mb-3">

                <label class="form-label fw-bold">

                    <i class="fa fa-user"></i>
                    Full Name

                </label>

                <input type="text"
                       class="form-control"
                       placeholder="Enter your name"
                       th:field="*{customerName}"
                       required>

            </div>

            <!-- City -->

            <div class="mb-3">

                <label class="form-label fw-bold">

                    <i class="fa fa-location-dot"></i>
                    City

                </label>

                <input type="text"
                       class="form-control"
                       placeholder="Enter your city"
                       th:field="*{city}"
                       required>

            </div>

            <!-- Image -->

            <div class="mb-4">

                <label class="form-label fw-bold">

                    <i class="fa fa-image"></i>
                    Upload Profile Photo

                </label>

                <div class="upload-box">

                    <input type="file"
                           class="form-control"
                           name="imageFile"
                           accept="image/*">

                </div>

            </div>

            <!-- Rating -->

            <div class="mb-4">

                <label class="form-label fw-bold text-center d-block">

                    Rate Your Experience

                </label>

                <div class="star-rating">

                    <input type="radio" id="5" th:field="*{rating}" value="5">
                    <label for="5">★</label>

                    <input type="radio" id="4" th:field="*{rating}" value="4">
                    <label for="4">★</label>

                    <input type="radio" id="3" th:field="*{rating}" value="3">
                    <label for="3">★</label>

                    <input type="radio" id="2" th:field="*{rating}" value="2">
                    <label for="2">★</label>

                    <input type="radio" id="1" th:field="*{rating}" value="1">
                    <label for="1">★</label>

                </div>

            </div>

            <!-- Review -->

            <div class="mb-4">

                <label class="form-label fw-bold">

                    <i class="fa fa-comment"></i>
                    Your Review

                </label>

                <textarea
                        class="form-control"
                        rows="5"
                        maxlength="500"
                        placeholder="Share your experience with our taxi service..."
                        th:field="*{reviewMessage}">
                </textarea>

            </div>

            <!-- Button -->

            <button class="btn btn-review">

                <i class="fa-solid fa-paper-plane"></i>

                Submit Review

            </button>

        </form>

    </div>

</div>

</body>
</html>
