<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Write Review</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
	rel="stylesheet">

</head>

<body>

	<div class="container mt-5">

		<div class="card shadow">

			<div class="card-body">

				<h2 class="text-center text-primary">Write Your Review</h2>

				<form th:action="@{/saveReview}" th:object="${review}" method="post">

					<div class="mb-3">

						<label>Name</label> <input type="text" class="form-control"
							th:field="*{customerName}" required>

					</div>

					<div class="mb-3">

						<label>City</label> <input type="text" class="form-control"
							th:field="*{city}" required>

					</div>

					<div class="mb-3">

						<label>Rating</label> <select class="form-select"
							th:field="*{rating}">

							<option value="5">★★★★★</option>

							<option value="4">★★★★</option>

							<option value="3">★★★</option>

							<option value="2">★★</option>

							<option value="1">★</option>

						</select>

					</div>

					<div class="mb-3">

						<label>Review</label>

						<textarea class="form-control" rows="5"
							th:field="*{reviewMessage}">
</textarea>

					</div>

					<button class="btn btn-success">Submit Review</button>

				</form>

			</div>

		</div>

	</div>

</body>

</html>
