<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Booking Successful | SwiftRide Gurgaon</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
	rel="stylesheet">

<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

<style>
body {
	background: linear-gradient(135deg, #0d6efd, #198754);
	min-height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	font-family: Arial, Helvetica, sans-serif;
}

.card-box {
	width: 700px;
	border: none;
	border-radius: 20px;
	box-shadow: 0 15px 35px rgba(0, 0, 0, .3);
}

.success-icon {
	font-size: 80px;
	color: #28a745;
}

.title {
	font-size: 35px;
	font-weight: bold;
	color: #198754;
}

.info {
	font-size: 18px;
}

table td {
	padding: 12px;
}

.btn-home {
	width: 180px;
}

.footer-text {
	color: gray;
	font-size: 14px;
}
</style>

</head>

<body>

	<div class="card card-box">

		<div class="card-body p-5">

			<div class="text-center">

				<i class="fas fa-circle-check success-icon"></i>

				<h2 class="title mt-3">Booking Confirmed</h2>

				<p class="text-muted">
					Thank you for choosing <b>SwiftRide Gurgaon</b>. Your cab has been
					booked successfully.
				</p>

			</div>

			<hr>

			<table class="table table-bordered">

				<tr>
					<th>Booking ID</th>
					<td th:text="${booking.bookingId}"></td>
				</tr>

				<tr>
					<th>Pickup City</th>
					<td th:text="${booking.pickupCity}"></td>
				</tr>

				<tr>
					<th>Drop City</th>
					<td th:text="${booking.dropCity}"></td>
				</tr>

				<tr>
					<th>Travel Date</th>
					<td th:text="${booking.travelDate}"></td>
				</tr>

				<tr>
					<th>Trip Type</th>
					<td th:text="${booking.tripType}"></td>
				</tr>

				<tr>
					<th>Cab Type</th>
					<td th:text="${booking.cabType}"></td>
				</tr>

				<tr>
					<th>Mobile Number</th>
					<td th:text="${booking.mobileNumber}"></td>
				</tr>

				<!-- <tr class="table-success">

					<th>Total Fare</th>
					<td><b>₹ <span th:text="${booking.fare}"></span></b></td>

				</tr> -->

			</table>

			<div class="text-center mt-4">

				<a href="/" class="btn btn-primary btn-lg btn-home"> <i
					class="fas fa-house"></i> Home

				</a> <a href="/" class="btn btn-success btn-lg btn-home ms-2"> <i
					class="fas fa-car"></i> Book Another

				</a> <a th:href="@{/review}" class="btn btn-warning btn-lg"> ⭐ Write
					a Review </a>

			</div>

			<hr>

			<div class="text-center footer-text">

				<i class="fas fa-phone"></i> Need Help? Call us: <b>+91
					8002467030</b> <br> <br> © 2026 SwiftRide Gurgaon. All Rights
				Reserved.

			</div>

		</div>

	</div>

</body>
</html>
